; /usr/local/etc/php-fpm.d/www.conf  (copied into image by Dockerfile)
; This makes php-fpm listen on the SAME socket nginx expects.

[www]
user  = www-data
group = www-data

; ── Match exactly what nginx.conf fastcgi_pass points to ─────────────
listen = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

pm = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Surface PHP errors to container logs
php_flag[display_errors]  = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Clear environment so Docker env vars reach PHP
clear_env = no
