# ─────────────────────────────────────────────────────────────────────────────
#  EMS – Build → ACR → Azure Container Apps
# ─────────────────────────────────────────────────────────────────────────────
#
#  Required GitHub Secrets:
#    ACR_USERNAME          – ACR admin username  (emsregistry)
#    ACR_PASSWORD          – ACR admin password
#    AZURE_CREDENTIALS     – JSON from: az ad sp create-for-rbac --sdk-auth
#    AZURE_RESOURCE_GROUP  – e.g. ems-rg
#    CONTAINER_APP_NAME    – e.g. ems-app
#    DB_HOST               – Azure MySQL FQDN
#    DB_NAME               – ems_db
#    DB_USER               – appuser@<server>
#    DB_PASS               – your password
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy EMS

on:
  push:
    branches: [ main ]

env:
  ACR_REGISTRY: emsregistry.azurecr.io
  IMAGE_NAME:   php-ems

jobs:
  # ───────────────────────────────────────────
  #  JOB 1 – Build & push image to ACR
  # ───────────────────────────────────────────
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
          # Layer cache from previous :latest build – speeds up repeat builds
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ───────────────────────────────────────────
  #  JOB 2 – Deploy to Azure Container Apps
  # ───────────────────────────────────────────
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:    ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          imageToDeploy:    ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          acrName:          emsregistry
          acrUsername:      ${{ secrets.ACR_USERNAME }}
          acrPassword:      ${{ secrets.ACR_PASSWORD }}
          targetPort:       80
          environmentVariables: >
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_PORT=3306

      - name: Print live URL
        run: |
          URL=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "✅ Live at: https://${URL}"
          echo "### ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://${URL}" >> $GITHUB_STEP_SUMMARY
