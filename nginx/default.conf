server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    # Health check endpoint for Azure Container Apps
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # ── KEY FIX: use Unix socket, NOT TCP 127.0.0.1:9000 ──────────
        # php-fpm inside the same container listens on a Unix socket by default.
        # TCP 9000 only works if php-fpm's pool config explicitly sets
        # listen = 0.0.0.0:9000 — the default is listen = /run/php/php-fpm.sock
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeouts – prevent upstream reset on slow DB queries
        fastcgi_connect_timeout  60s;
        fastcgi_send_timeout    180s;
        fastcgi_read_timeout    180s;
        fastcgi_buffer_size      16k;
        fastcgi_buffers        4 16k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
