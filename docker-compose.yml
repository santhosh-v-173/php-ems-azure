version: '3'

services:

  php:
    build: .
    container_name: php-app
    volumes:
      - .:/var/www/html

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php